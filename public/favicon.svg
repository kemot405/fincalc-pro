<svg width="240" height="80" viewBox="0 0 240 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop stop-color="#B8E0B0" offset="0" />
      <stop stop-color="#4F8F66" offset="1" />
    </linearGradient>
    <radialGradient id="r1" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.0"/>
    </radialGradient>
    <filter id="f1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- 3D-ish calculator body -->
  <g filter="url(#f1)">
    <rect x="6" y="6" rx="10" ry="10" width="64" height="64" fill="#3b3b3b"/>
    <rect x="10" y="10" rx="8" ry="8" width="56" height="36" fill="url(#g1)"/>
    <!-- screen -->
    <rect x="14" y="14" width="48" height="14" rx="3" fill="#082618" />
    <!-- buttons -->
    <g transform="translate(14,32)">
      <circle cx="8" cy="8" r="6" fill="#f6b36b"/>
      <circle cx="24" cy="8" r="6" fill="#ffd36b"/>
      <circle cx="40" cy="8" r="6" fill="#f6b36b"/>
      <rect x="0" y="20" rx="3" width="44" height="8" fill="#2d6b4d"/>
    </g>
  </g>

  <!-- Text -->
  <g transform="translate(86,44)">
    <text x="0" y="0" font-family="Segoe UI, Roboto, Arial" font-weight="700" font-size="22" fill="#dfeee0">FinCalc</text>
    <text x="0" y="22" font-family="Segoe UI, Roboto, Arial" font-weight="700" font-size="18" fill="#f3a456">Pro</text>
  </g>
</svg>